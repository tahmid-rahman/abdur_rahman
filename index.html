<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Abdur Rahman — CSE Engineer & ML Researcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *:before,
      *:after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #060912;
        --bg2: #0c1120;
        --bg3: #111827;
        --cyan: #22d3ee;
        --cyan2: #06b6d4;
        --emerald: #10b981;
        --violet: #a78bfa;
        --text: #f1f5f9;
        --text2: #94a3b8;
        --text3: #475569;
        --border: rgba(34, 211, 238, 0.12);
        --border2: rgba(34, 211, 238, 0.28);
      }

      html {
        scroll-behavior: smooth;
        font-size: 16px;
      }

      body {
        background:
          radial-gradient(circle at 18% 8%, rgba(34, 211, 238, 0.12), transparent 28rem),
          radial-gradient(circle at 88% 18%, rgba(167, 139, 250, 0.1), transparent 26rem),
          linear-gradient(180deg, #050813 0%, #08101c 46%, #060912 100%);
        color: var(--text);
        font-family: Inter, sans-serif;
        overflow-x: hidden;
        line-height: 1.6;
      }

      ::-webkit-scrollbar {
        width: 3px;
      }

      ::-webkit-scrollbar-track {
        background: var(--bg);
      }

      ::-webkit-scrollbar-thumb {
        background: var(--cyan2);
        border-radius: 2px;
      }

      ::selection {
        background: #22d3ee33;
      }

      @keyframes blink {
        0%,
        to {
          opacity: 1;
        }

        50% {
          opacity: 0;
        }
      }

      @keyframes fadeUp {
        0% {
          opacity: 0;
          transform: translateY(24px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes drift {
        0% {
          transform: translate(0) scale(1);
          opacity: 0.4;
        }

        50% {
          opacity: 0.8;
        }

        to {
          transform: translate(var(--dx, 20px), var(--dy, -40px)) scale(0.5);
          opacity: 0;
        }
      }

      @keyframes spin {
        0% {
          transform: rotate(0);
        }

        to {
          transform: rotate(360deg);
        }
      }

      .section-fade {
        animation: fadeUp 0.6s ease forwards;
      }

      #root {
        position: relative;
        z-index: 1;
      }

      section[id] {
        scroll-margin-top: 6rem;
      }

      .hero-shell {
        width: 100%;
      }

      .hero-kicker {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        padding: 0.45rem 0.7rem;
        border: 1px solid rgba(34, 211, 238, 0.16);
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.52);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      .hero-copy {
        border-left: 2px solid rgba(34, 211, 238, 0.28);
        padding-left: 1rem;
      }

      .hero-actions a {
        min-height: 2.75rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .section-card {
        background: linear-gradient(180deg, rgba(17, 24, 39, 0.96), rgba(12, 17, 32, 0.96)) !important;
        border-color: rgba(34, 211, 238, 0.13) !important;
        border-radius: 8px !important;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.2);
      }

      .project-card {
        border-radius: 8px !important;
        background:
          linear-gradient(180deg, rgba(17, 24, 39, 0.96), rgba(12, 17, 32, 0.98)),
          radial-gradient(circle at 10% 0%, rgba(34, 211, 238, 0.14), transparent 18rem) !important;
        box-shadow: 0 20px 54px rgba(0, 0, 0, 0.18);
      }

      .project-card h3,
      .section-card h3,
      .certificate-card h3 {
        overflow-wrap: anywhere;
      }

      .recruiter-note {
        display: flex;
        flex-wrap: wrap;
        gap: 0.55rem;
        margin: 1rem 0 2.1rem;
      }

      .recruiter-note span {
        padding: 0.45rem 0.65rem;
        border-radius: 8px;
        color: #dbeafe;
        background: rgba(34, 211, 238, 0.08);
        border: 1px solid rgba(34, 211, 238, 0.13);
        font-family: "JetBrains Mono", monospace;
        font-size: 0.68rem;
      }

      .site-nav {
        gap: 1rem;
      }

      .site-nav-brand {
        white-space: nowrap;
      }

      .site-nav-toggle {
        display: none;
        width: 2.4rem;
        height: 2.4rem;
        border-radius: 8px;
        border: 1px solid rgba(34, 211, 238, 0.18);
        background: rgba(12, 17, 32, 0.9);
        color: var(--text);
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .site-nav-toggle span,
      .site-nav-toggle span:before,
      .site-nav-toggle span:after {
        content: "";
        display: block;
        width: 1.05rem;
        height: 2px;
        border-radius: 999px;
        background: currentColor;
        transition: transform 0.25s ease, opacity 0.25s ease;
      }

      .site-nav-toggle span {
        position: relative;
      }

      .site-nav-toggle span:before,
      .site-nav-toggle span:after {
        position: absolute;
        left: 0;
      }

      .site-nav-toggle span:before {
        top: -6px;
      }

      .site-nav-toggle span:after {
        top: 6px;
      }

      .site-nav-toggle.is-open span {
        background: transparent;
      }

      .site-nav-toggle.is-open span:before {
        transform: translateY(6px) rotate(45deg);
      }

      .site-nav-toggle.is-open span:after {
        transform: translateY(-6px) rotate(-45deg);
      }

      .site-nav-links {
        display: flex;
        gap: 2rem;
        align-items: center;
        justify-content: flex-end;
        flex-wrap: wrap;
      }

      .site-nav-link {
        position: relative;
        padding: 0.2rem 0;
        white-space: nowrap;
      }

      .site-nav-link:after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: -0.35rem;
        height: 1px;
        background: linear-gradient(90deg, #22d3ee, #a78bfa);
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.25s ease;
      }

      .site-nav-link:hover:after {
        transform: scaleX(1);
      }

      .certificate-card {
        min-width: 0;
        position: relative;
        box-shadow: 0 18px 46px rgba(0, 0, 0, 0.22);
      }

      .certificate-image {
        width: 100%;
        aspect-ratio: 16 / 10.8;
        object-fit: contain;
        display: block;
        background: #f8fafc;
        padding: 0.45rem;
      }

      .certificate-media {
        display: block;
        background: linear-gradient(135deg, rgba(34, 211, 238, 0.16), rgba(167, 139, 250, 0.12));
        padding: 0.55rem;
        text-decoration: none;
      }

      .certificate-action {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 0.9rem;
        padding: 0.55rem 0.8rem;
        border-radius: 8px;
        border: 1px solid rgba(34, 211, 238, 0.18);
        color: #f1f5f9;
        text-decoration: none;
        font-size: 0.7rem;
        font-family: "JetBrains Mono", monospace;
        background: rgba(15, 23, 42, 0.72);
        transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
      }

      .certificate-action:hover {
        border-color: rgba(34, 211, 238, 0.42);
        background: rgba(34, 211, 238, 0.1);
        transform: translateY(-1px);
      }

      @media (max-width: 820px) {
        .site-nav {
          padding: 0.8rem 1rem !important;
          align-items: center !important;
        }

        .site-nav-links {
          gap: 0.65rem 1rem !important;
          max-width: calc(100vw - 5rem);
        }

        .site-nav-link {
          font-size: 0.68rem !important;
          letter-spacing: 0.04em !important;
        }
      }

      @media (max-width: 760px) {
        .site-nav {
          flex-wrap: wrap;
          background: rgba(6, 9, 18, 0.92) !important;
          backdrop-filter: blur(20px) !important;
          border-bottom: 1px solid rgba(34, 211, 238, 0.08) !important;
        }

        .site-nav-toggle {
          display: inline-flex;
        }

        .site-nav-links {
          width: 100%;
          max-width: 100%;
          max-height: 0;
          opacity: 0;
          overflow: hidden;
          justify-content: flex-start;
          padding-top: 0;
          transition: max-height 0.3s ease, opacity 0.2s ease, padding-top 0.3s ease;
        }

        .site-nav-links.is-open {
          max-height: 14rem;
          opacity: 1;
          padding-top: 0.45rem;
        }

        .site-nav-link {
          width: calc(50% - 0.5rem);
          padding: 0.55rem 0.65rem !important;
          border: 1px solid rgba(148, 163, 184, 0.12);
          border-radius: 8px;
          background: rgba(15, 23, 42, 0.52);
        }

        #about {
          min-height: auto !important;
          padding: 8.5rem 1rem 4.5rem !important;
        }

        #about > div:last-child {
          padding-top: 0 !important;
        }

        #about [style*="width: 200px"] {
          width: 150px !important;
          height: 150px !important;
        }

        section[id] {
          padding-left: 1rem !important;
          padding-right: 1rem !important;
        }

        section[id] [style*="min-width: 300px"] {
          min-width: 0 !important;
          width: 100% !important;
        }

        section[id] [style*="grid-template-columns"] {
          grid-template-columns: 1fr !important;
        }

        section[id] [style*="padding: 2rem"],
        section[id] [style*="padding: 1.8rem"],
        section[id] [style*="padding: 1.5rem 2rem"] {
          padding: 1.15rem !important;
        }

        h1 {
          overflow-wrap: anywhere;
        }

        .hero-copy {
          border-left: 0;
          padding-left: 0;
        }

        .certificate-grid {
          grid-template-columns: 1fr !important;
        }
      }

      @media (max-width: 380px) {
        .site-nav-link {
          width: 100%;
        }
      }
    </style>
  </head>
